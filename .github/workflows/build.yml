name: Build Moustache Mod Menu

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Homebrew and Dependencies
      run: |
        brew install ldid xz
        echo "LOGOS_CHECK=0" >> $GITHUB_ENV

    - name: Set up Theos Development Environment
      run: |
        git clone --recursive https://github.com ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH

    - name: Download iOS SDK
      run: |
        git clone https://github.com ~/theos/sdks
        # استخدام إصدار SDK مستقر لتفادي مشاكل واجهات المنيو
        ls -la ~/theos/sdks/

    - name: Compile and Build Package (.deb)
      run: |
        export THEOS=~/theos
        make clean
        make package FINALPACKAGE=1

    - name: Upload Finished Mod Menu Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MoustacheMenu-DEB
        path: packages/*.deb
